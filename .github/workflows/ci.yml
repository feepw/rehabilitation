name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Limit the GITHUB_TOKEN to the minimum required permissions.
permissions:
  contents: read

# Cancel any in-progress run for the same branch / PR to avoid wasting
# runner minutes when new commits are pushed rapidly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache the CMake build directory so that FetchContent dependencies
      # (e.g. GoogleTest) are not re-downloaded on every run.
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ matrix.build_type }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.build_type }}-

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Run tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
